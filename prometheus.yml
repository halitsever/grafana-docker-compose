global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "node"
    scrape_interval: 5s
    static_configs:
      - targets: ["myserver_node_exporter:9100"]
        labels:
          instance: "My Favorite Server Name"
      # - targets: ["anotherserver_node_exporter:9100"]
      #   labels:
      #     instance: "Another Server"

  - job_name: "cadvisor"
    scrape_interval: 10s
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
